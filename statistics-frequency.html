<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. 숫자별 출현 빈도 | Statistics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        nav { background-color: #fefefe; padding: 10px; text-align: center; }
        nav ul { list-style: none; padding: 0; margin: 0; display: flex; justify-content: center; flex-wrap: wrap; }
        nav li { margin: 8px 15px; }
        nav a { text-decoration: none; color: black; font-weight: bold; }
        nav a:hover { color: #003087; }
        .container { max-width: 1100px; margin: 40px auto; padding: 20px; }
        h1 { color: #003087; }
        .subtitle { color: #555; font-size: 1.1em; margin-bottom: 30px; }
        canvas { max-width: 100%; height: 420px !important; margin: 30px 0; }
        
        /* Top 10 & Bottom 10 */
        .rank-section { margin: 40px 0; }
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .rank-table th, .rank-table td { 
            border: 1px solid #ddd; 
            padding: 12px; 
            text-align: center; 
        }
        .rank-table th { background: #f2f2f2; }
        .top10 { border-left: 5px solid #003087; }
        .bottom10 { border-left: 5px solid #888; }

        /* 전체 테이블 */
        table#freqTable { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
            overflow-x: auto; 
            display: block;
        }
        th, td { 
            border: 1px solid #ddd; 
            padding: 10px; 
            text-align: center; 
            font-size: 0.95em;
        }
        th { background: #f2f2f2; }
        
        .sort-buttons {
            margin: 20px 0;
        }
        .sort-btn {
            padding: 10px 18px;
            margin-right: 10px;
            background: #003087;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .sort-btn:hover { background: #002266; }
        
        .back-btn { 
            display: inline-block; 
            margin: 40px 0; 
            padding: 12px 24px; 
            background: #003087; 
            color: white; 
            text-decoration: none; 
            border-radius: 6px; 
        }

        @media (max-width: 600px) {
            canvas { height: 350px !important; }
            th, td { padding: 8px; font-size: 0.9em; }
            nav ul { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav>
        <ul id="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="tax.html">TAX</a></li>
            <li><a href="top-prize.html">TOP 50</a></li>
            <li><a href="statistics.html" style="color:#003087; font-weight:bold;">Statistics</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>1. 숫자별 출현 빈도 (1,221회차 기준)</h1>
        <p class="subtitle">본번호 6개 중 각 숫자가 나온 총 횟수입니다.</p>
        
        <canvas id="freqChart"></canvas>

        <!-- Top 10 -->
        <div class="rank-section">
            <h2>🔥 Top 10 가장 많이 나온 숫자</h2>
            <table class="rank-table top10" id="top10Table">
                <thead><tr><th>순위</th><th>숫자</th><th>출현 횟수</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Bottom 10 -->
        <div class="rank-section">
            <h2>❄️ Bottom 10 가장 적게 나온 숫자</h2>
            <table class="rank-table bottom10" id="bottom10Table">
                <thead><tr><th>순위</th><th>숫자</th><th>출현 횟수</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="sort-buttons">
            <button class="sort-btn" onclick="sortTable('desc')">많이 나온 순 ▼</button>
            <button class="sort-btn" onclick="sortTable('asc')">적게 나온 순 ▲</button>
        </div>

        <h2>전체 숫자별 출현 횟수</h2>
        <table id="freqTable">
            <thead>
                <tr>
                    <th>순위</th>
                    <th>숫자</th>
                    <th>출현 횟수</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <a href="statistics.html" class="back-btn">← 통계 메인으로 돌아가기</a>
    </div>

    <script>
        let allData = [];

        fetch('lotto-data.json')
            .then(response => response.json())
            .then(jsonData => {
                // 출현 횟수 계산
                const freq = new Array(45).fill(0);
                jsonData.draws.forEach(draw => {
                    draw.numbers.forEach(num => {
                        if (num >= 1 && num <= 45) freq[num - 1]++;
                    });
                });

                const labels = Array.from({length: 45}, (_, i) => i + 1);
                allData = labels.map((num, i) => ({
                    num: num,
                    count: freq[i]
                }));

                // 그래프
                new Chart(document.getElementById('freqChart'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '출현 횟수',
                            data: freq,
                            backgroundColor: '#003087'
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: { y: { beginAtZero: true } }
                    }
                });

                // Top 10 & Bottom 10
                const sortedDesc = [...allData].sort((a, b) => b.count - a.count);
                renderRankTable('top10Table', sortedDesc.slice(0, 10));
                renderRankTable('bottom10Table', sortedDesc.slice(-10).reverse());

                // 전체 테이블 (기본 내림차순)
                renderFullTable(sortedDesc);
            });

        function renderRankTable(tableId, data) {
            const tbody = document.getElementById(tableId).querySelector('tbody');
            tbody.innerHTML = '';
            data.forEach((item, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${idx + 1}</strong></td>
                    <td><strong>${item.num}</strong></td>
                    <td>${item.count}회</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderFullTable(data) {
            const tbody = document.querySelector('#freqTable tbody');
            tbody.innerHTML = '';
            data.forEach((item, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${idx + 1}</td>
                    <td><strong>${item.num}</strong></td>
                    <td>${item.count}회</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function sortTable(order) {
            let sorted = [...allData];
            if (order === 'desc') {
                sorted.sort((a, b) => b.count - a.count);
            } else {
                sorted.sort((a, b) => a.count - b.count);
            }
            renderFullTable(sorted);
        }
    </script>

    <footer style="margin-top:60px; font-size:0.8em; color:gray; text-align:center;">
        <p>&copy; 2026 lottodraw.kr. All rights reserved.</p>
    </footer>
</body>
</html>
