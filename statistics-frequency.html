<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. 숫자별 출현 빈도 | Statistics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        nav { background-color: #fefefe; padding: 10px; text-align: center; }
        nav ul { list-style: none; padding: 0; margin: 0; display: flex; justify-content: center; flex-wrap: wrap; }
        nav li { margin: 8px 15px; }
        nav a { text-decoration: none; color: black; font-weight: bold; }
        nav a:hover { color: #003087; }
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        h1 { color: #003087; }
        .subtitle { color: #555; font-size: 1.1em; margin-bottom: 30px; }
        canvas { max-width: 100%; height: 420px !important; margin: 30px 0; }

        /* Top 10 & Bottom 10 */
        .rank-section { margin: 40px 0; }
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .rank-table th, .rank-table td { 
            border: 1px solid #ddd; 
            padding: 12px; 
            text-align: center; 
        }
        .rank-table th { background: #f2f2f2; }
        .top10 { border-left: 5px solid #003087; }
        .bottom10 { border-left: 5px solid #888; }

        /* 그룹화된 전체 테이블 */
        .freq-groups {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 40px 0;
        }
        .freq-group {
            flex: 1;
            min-width: 180px;
        }
        .freq-group h3 {
            text-align: center;
            color: #003087;
            margin-bottom: 10px;
        }
        .freq-group table {
            width: 100%;
            border-collapse: collapse;
        }
        .freq-group th, .freq-group td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        .freq-group th { background: #f8f9fa; }

        .sort-buttons {
            margin: 20px 0;
        }
        .sort-btn {
            padding: 12px 20px;
            margin-right: 12px;
            background: #003087;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .sort-btn:hover { background: #002266; }

        .back-btn { 
            display: inline-block; 
            margin: 40px 0; 
            padding: 12px 24px; 
            background: #003087; 
            color: white; 
            text-decoration: none; 
            border-radius: 6px; 
        }

        @media (max-width: 768px) {
            canvas { height: 360px !important; }
            .freq-groups { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="tax.html">TAX</a></li>
            <li><a href="top-prize.html">TOP 50</a></li>
            <li><a href="statistics.html" style="color:#003087; font-weight:bold;">Statistics</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>1. 숫자별 출현 빈도 (1,221회차 기준)</h1>
        <p class="subtitle">본번호 6개 중 각 숫자가 나온 총 횟수입니다.</p>
        
        <canvas id="freqChart"></canvas>

        <div class="sort-buttons">
            <button class="sort-btn" onclick="sortChartAndData('desc')">그래프 - 많이 나온 순 ▼</button>
            <button class="sort-btn" onclick="sortChartAndData('asc')">그래프 - 적게 나온 순 ▲</button>
        </div>

        <!-- Top 10 -->
        <div class="rank-section">
            <h2>🔥 Top 10 가장 많이 나온 숫자</h2>
            <table class="rank-table top10" id="top10Table">
                <thead><tr><th>순위</th><th>숫자</th><th>출현 횟수</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Bottom 10 -->
        <div class="rank-section">
            <h2>❄️ Bottom 10 가장 적게 나온 숫자</h2>
            <table class="rank-table bottom10" id="bottom10Table">
                <thead><tr><th>순위</th><th>숫자</th><th>출현 횟수</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 전체 숫자별 (10단위 그룹화) -->
        <h2>전체 숫자별 출현 횟수</h2>
        <div class="freq-groups" id="freqGroups"></div>

        <a href="statistics.html" class="back-btn">← 통계 메인으로 돌아가기</a>
    </div>

    <script>
        let myChart = null;
        let allData = [];

        fetch('lotto-data.json')
            .then(response => response.json())
            .then(jsonData => {
                const freq = new Array(45).fill(0);
                jsonData.draws.forEach(draw => {
                    draw.numbers.forEach(num => {
                        if (num >= 1 && num <= 45) freq[num - 1]++;
                    });
                });

                const labels = Array.from({length: 45}, (_, i) => i + 1);
                allData = labels.map((num, i) => ({ num: num, count: freq[i] }));

                // 초기 그래프 (기본 내림차순)
                renderChart(labels, freq);

                // Top 10 & Bottom 10
                const sortedDesc = [...allData].sort((a, b) => b.count - a.count);
                renderRankTable('top10Table', sortedDesc.slice(0, 10));
                renderRankTable('bottom10Table', sortedDesc.slice(-10).reverse());

                // 10단위 그룹 테이블
                renderGroupedTables(allData);
            });

        function renderChart(labels, data) {
            if (myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('freqChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '출현 횟수',
                        data: data,
                        backgroundColor: '#003087'
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function sortChartAndData(order) {
            let sortedData = [...allData];
            if (order === 'desc') {
                sortedData.sort((a, b) => b.count - a.count);
            } else {
                sortedData.sort((a, b) => a.count - b.count);
            }

            const newLabels = sortedData.map(item => item.num);
            const newCounts = sortedData.map(item => item.count);

            renderChart(newLabels, newCounts);
        }

        function renderRankTable(tableId, data) {
            const tbody = document.getElementById(tableId).querySelector('tbody');
            tbody.innerHTML = '';
            data.forEach((item, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><strong>${idx + 1}</strong></td><td><strong>${item.num}</strong></td><td>${item.count}회</td>`;
                tbody.appendChild(tr);
            });
        }

        function renderGroupedTables(data) {
            const container = document.getElementById('freqGroups');
            container.innerHTML = '';
            const groups = [
                { title: '1 ~ 10', start: 1, end: 10 },
                { title: '11 ~ 20', start: 11, end: 20 },
                { title: '21 ~ 30', start: 21, end: 30 },
                { title: '31 ~ 40', start: 31, end: 40 },
                { title: '41 ~ 45', start: 41, end: 45 }
            ];

            groups.forEach(group => {
                const groupData = data.filter(item => item.num >= group.start && item.num <= group.end);
                
                const div = document.createElement('div');
                div.className = 'freq-group';
                div.innerHTML = `
                    <h3>${group.title}</h3>
                    <table>
                        <thead><tr><th>숫자</th><th>출현 횟수</th></tr></thead>
                        <tbody></tbody>
                    </table>
                `;
                const tbody = div.querySelector('tbody');
                groupData.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td><strong>${item.num}</strong></td><td>${item.count}회</td>`;
                    tbody.appendChild(tr);
                });
                container.appendChild(div);
            });
        }
    </script>

    <footer style="margin-top:60px; font-size:0.8em; color:gray; text-align:center;">
        <p>&copy; 2026 lottodraw.kr. All rights reserved.</p>
    </footer>
</body>
</html>
