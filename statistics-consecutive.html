    <div class="container">
        <h1>5. 연속번호 분석</h1>
        <p id="subtitle" class="subtitle">로또 6/45 데이터를 분석 중...</p>
        
        <canvas id="consecutiveChart"></canvas>

        <h2>최대 연속 길이별 상세 분포</h2>
        <table id="consecutiveTable">
            <thead>
                <tr>
                    <th>패턴</th>
                    <th>출현 횟수</th>
                    <th>비율</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    <footer style="margin-top:60px; font-size:0.8em; color:gray; text-align:center;">

    </footer>

    <script>
        let myChart = null;

        fetch('lotto-data.json')
            .then(response => response.json())
            .then(jsonData => {
                const totalRounds = jsonData.draws.length;

                document.getElementById('subtitle').innerHTML = 
                    `최신 <strong>${totalRounds}</strong>회차 기준`;

                // 최대 연속 길이 계산
                const patternCount = new Array(5).fill(0); // 0, 2, 3, 4, 5+

                jsonData.draws.forEach(draw => {
                    const sorted = [...draw.numbers].sort((a, b) => a - b);
                    let maxStreak = 1;
                    let currentStreak = 1;

                    for (let i = 1; i < 6; i++) {
                        if (sorted[i] === sorted[i-1] + 1) {
                            currentStreak++;
                            maxStreak = Math.max(maxStreak, currentStreak);
                        } else {
                            currentStreak = 1;
                        }
                    }

                    if (maxStreak === 1) patternCount[0]++;           // 연속 없음
                    else if (maxStreak === 2) patternCount[1]++;      // 최대 2연속
                    else if (maxStreak === 3) patternCount[2]++;      // 최대 3연속
                    else if (maxStreak === 4) patternCount[3]++;      // 최대 4연속
                    else patternCount[4]++;                           // 5연속 이상
                });

                const labels = [
                    '연속 없음',
                    '최대 연속 2개',
                    '최대 연속 3개',
                    '최대 연속 4개',
                    '최대 연속 5개 이상'
                ];
                const counts = patternCount;
                const percentages = counts.map(c => (c / totalRounds * 100).toFixed(2) + '%');

                renderChart(labels, counts);

                const tbody = document.querySelector('#consecutiveTable tbody');
                tbody.innerHTML = '';
                labels.forEach((label, i) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${label}</strong></td>
                        <td>${counts[i]}회</td>
                        <td>${percentages[i]}</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById('subtitle').innerHTML = 
                    `<span style="color:red;">데이터 로드 실패 - lotto-data.json 확인</span>`;
            });

        function renderChart(labels, data) {
            if (myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('consecutiveChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '출현 횟수',
                        data: data,
                        backgroundColor: '#003087'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    scales: { x: { beginAtZero: true } }
                }
            });
        }

        function toggleMenu() {
            const menu = document.getElementById('nav-menu');
            menu.classList.toggle('active');
        }
    </script>
