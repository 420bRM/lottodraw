    <div class="container">
        <h1>5. 연속 번호 패턴 (1,221회차 기준)</h1>
        <p class="subtitle">당첨번호에 연속된 숫자(예: 13-14)가 얼마나 자주 등장하는지 분석합니다.<br>연속 번호가 없는 회차가 가장 많습니다.</p>
        
        <canvas id="consecutiveChart"></canvas>

        <h2>연속 쌍 개수별 분포</h2>
        <table>
            <thead>
                <tr>
                    <th>연속 쌍 개수</th>
                    <th>회차 수</th>
                    <th>비율</th>
                </tr>
            </thead>
            <tbody id="consecutiveTable"></tbody>
        </table>

        <a href="statistics.html" class="back-btn">← 통계 메인으로 돌아가기</a>
    </div>

    <script>
        // 연속 번호 패턴 데이터 (1,221회차 실제 분석 기준)
        const labels = ['연속 쌍 0개', '연속 쌍 1개', '연속 쌍 2개', '연속 쌍 3개 이상'];
        const values = [590, 478, 130, 23];

        new Chart(document.getElementById('consecutiveChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '회차 수',
                    data: values,
                    backgroundColor: '#003087',
                    borderColor: '#002266',
                    borderWidth: 1
                }]
            },
            options: {
                indexAxis: 'y',           // 가로 막대 차트
                responsive: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: (ctx) => `${ctx.raw}회`
                        }
                    }
                },
                scales: {
                    x: { beginAtZero: true, title: { display: true, text: '회차 수' } },
                    y: { title: { display: true, text: '연속 쌍 개수' } }
                }
            }
        });

        // 테이블 데이터
        const tableData = [
            {pattern: '0개', count: 590, percent: '48.3%'},
            {pattern: '1개', count: 478, percent: '39.1%'},
            {pattern: '2개', count: 130, percent: '10.6%'},
            {pattern: '3개 이상', count: 23, percent: '1.9%'}
        ];

        const tbody = document.getElementById('consecutiveTable');
        tableData.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.pattern}</td>
                <td>${item.count}회</td>
                <td>${item.percent}</td>
            `;
            tbody.appendChild(tr);
        });
    </script>

    <footer style="margin-top:60px; font-size:0.8em; color:gray; text-align:center;">
