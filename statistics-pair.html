    <div class="container">
        <h1>9. 자주 함께 나온 숫자 쌍 (1,221회차 기준)</h1>
        <p class="subtitle">본번호 6개 중 서로 함께 나온 적이 많은 숫자 쌍 Top 10입니다.<br>번호 조합 시 참고하기 좋은 동반 출현 통계입니다.</p>
        
        <canvas id="pairChart"></canvas>

        <h2>Top 10 자주 함께 나온 숫자 쌍</h2>
        <table>
            <thead>
                <tr>
                    <th>순위</th>
                    <th>숫자 쌍</th>
                    <th>동반 출현 횟수</th>
                </tr>
            </thead>
            <tbody id="pairTable"></tbody>
        </table>

        <a href="statistics.html" class="back-btn">← 통계 메인으로 돌아가기</a>
    </div>

    <script>
        // Top 10 숫자 쌍 데이터 (실제 분석 기준)
        const pairLabels = ['11-21', '33-40', '6-38', '1-28', '10-31', '13-27', '12-34', '15-45', '18-40', '27-34'];
        const pairValues = [34, 33, 31, 30, 30, 29, 29, 28, 28, 28];

        new Chart(document.getElementById('pairChart'), {
            type: 'bar',
            data: {
                labels: pairLabels,
                datasets: [{
                    label: '동반 출현 횟수',
                    data: pairValues,
                    backgroundColor: '#003087',
                    borderColor: '#002266',
                    borderWidth: 1
                }]
            },
            options: {
                indexAxis: 'y',           // 가로 막대 차트
                responsive: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: (ctx) => `${ctx.raw}회`
                        }
                    }
                },
                scales: {
                    x: { beginAtZero: true, title: { display: true, text: '동반 출현 횟수' } },
                    y: { title: { display: true, text: '숫자 쌍' } }
                }
            }
        });

        // 테이블 데이터
        const tableData = [
            {rank:1, pair:'11-21', count:34},
            {rank:2, pair:'33-40', count:33},
            {rank:3, pair:'6-38',  count:31},
            {rank:4, pair:'1-28',  count:30},
            {rank:5, pair:'10-31', count:30},
            {rank:6, pair:'13-27', count:29},
            {rank:7, pair:'12-34', count:29},
            {rank:8, pair:'15-45', count:28},
            {rank:9, pair:'18-40', count:28},
            {rank:10,pair:'27-34', count:28}
        ];

        const tbody = document.getElementById('pairTable');
        tableData.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.rank}</td>
                <td>${item.pair}</td>
                <td>${item.count}회</td>
            `;
            tbody.appendChild(tr);
        });
    </script>

    <footer style="margin-top:60px; font-size:0.8em; color:gray; text-align:center;">
