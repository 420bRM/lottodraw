    <div class="container">
        <h1>6. 합계 분포 분석</h1>
        <p id="subtitle" class="subtitle">로또 6/45 데이터를 분석 중...</p>
        
        <canvas id="sumChart"></canvas>

        <h2>합계 구간별 상세 분포</h2>
        <table id="sumTable">
            <thead>
                <tr>
                    <th>합계 구간</th>
                    <th>출현 횟수</th>
                    <th>비율</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </footer>

    <script>
        let myChart = null;

        fetch('lotto-data.json')
            .then(response => response.json())
            .then(jsonData => {
                const totalRounds = jsonData.draws.length;

                document.getElementById('subtitle').innerHTML = 
                    `최신 <strong>${totalRounds}</strong>회차 기준`;

                // 합계 구간 계산
                const bins = [99, 119, 139, 159, 179, 199]; // 구간 경계
                const labels = [
                    '21~99', '100~119', '120~139', 
                    '140~159', '160~179', '180~199', '200+'
                ];
                const count = new Array(7).fill(0);

                jsonData.draws.forEach(draw => {
                    const sum = draw.numbers.reduce((acc, num) => acc + num, 0);
                    let index = 0;
                    while (index < bins.length && sum > bins[index]) index++;
                    count[index]++;
                });

                const percentages = count.map(c => (c / totalRounds * 100).toFixed(2) + '%');

                // 가로 막대 차트
                renderChart(labels, count);

                // 테이블 채우기
                const tbody = document.querySelector('#sumTable tbody');
                tbody.innerHTML = '';
                labels.forEach((label, i) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${label}</strong></td>
                        <td>${count[i]}회</td>
                        <td>${percentages[i]}</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById('subtitle').innerHTML = 
                    `<span style="color:red;">데이터 로드 실패 - lotto-data.json 확인</span>`;
            });

        function renderChart(labels, data) {
            if (myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('sumChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '출현 횟수',
                        data: data,
                        backgroundColor: '#003087'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    scales: { x: { beginAtZero: true } }
                }
            });
        }

        function toggleMenu() {
            const menu = document.getElementById('nav-menu');
            menu.classList.toggle('active');
        }
    </script>
