    <div class="container">
        <h1>6. 번호 합계 분포 (1,221회차 기준)</h1>
        <p class="subtitle">6개 본번호의 합계 분포입니다.<br>평균 합계는 약 138.2이며, 120~139 구간이 가장 많이 등장합니다.</p>
        
        <canvas id="sumChart"></canvas>

        <h2>합계 구간별 분포</h2>
        <table>
            <thead>
                <tr>
                    <th>합계 구간</th>
                    <th>회차 수</th>
                    <th>비율</th>
                </tr>
            </thead>
            <tbody id="sumTable"></tbody>
        </table>

        <a href="statistics.html" class="back-btn">← 통계 메인으로 돌아가기</a>
    </div>

    <script>
        // 합계 구간 데이터 (1,221회차 실제 분석 기준)
        const labels = ['~99', '100~119', '120~139', '140~159', '160~179', '180~199', '200~219', '220~238'];
        const values = [28, 185, 310, 265, 210, 145, 55, 23];

        new Chart(document.getElementById('sumChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '회차 수',
                    data: values,
                    backgroundColor: '#003087',
                    borderColor: '#002266',
                    borderWidth: 1
                }]
            },
            options: {
                indexAxis: 'y',           // 가로 막대 차트
                responsive: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: (ctx) => `${ctx.raw}회`
                        }
                    }
                },
                scales: {
                    x: { beginAtZero: true, title: { display: true, text: '회차 수' } },
                    y: { title: { display: true, text: '합계 구간' } }
                }
            }
        });

        // 테이블 데이터
        const tableData = [
            {range: '~99',     count: 28,  percent: "2.3%"},
            {range: '100~119', count: 185, percent: "15.2%"},
            {range: '120~139', count: 310, percent: "25.4%"},
            {range: '140~159', count: 265, percent: "21.7%"},
            {range: '160~179', count: 210, percent: "17.2%"},
            {range: '180~199', count: 145, percent: "11.9%"},
            {range: '200~219', count: 55,  percent: "4.5%"},
            {range: '220~238', count: 23,  percent: "1.9%"}
        ];

        const tbody = document.getElementById('sumTable');
        tableData.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.range}</td>
                <td>${item.count}회</td>
                <td>${item.percent}</td>
            `;
            tbody.appendChild(tr);
        });
    </script>

    <footer style="margin-top:60px; font-size:0.8em; color:gray; text-align:center;">
