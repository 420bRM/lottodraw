<body>

    <div class="container">
        <h1>8. 핫/콜드 넘버</h1>
        <p id="subtitle" class="subtitle">로또 6/45 데이터를 분석 중...</p>
        
        <h2>🔥 Hot Numbers (최근 50회 가장 많이 나온 숫자)</h2>
        <canvas id="hotChart"></canvas>

        <h2>❄️ Cold Numbers (최근 50회 가장 적게 나온 숫자)</h2>
        <canvas id="coldChart"></canvas>

        <h2>Hot / Cold 상세 비교 테이블</h2>
        <table id="trendTable">
            <thead>
                <tr>
                    <th>숫자</th>
                    <th>전체 출현</th>
                    <th>최근 50회</th>
                    <th>차이</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <a href="statistics.html" class="back-btn">← 통계 메인으로 돌아가기</a>
    </div>

    <footer style="margin-top:60px; font-size:0.8em; color:gray; text-align:center;">
        <p>&copy; 2026 lottodraw.kr. All rights reserved.</p>
    </footer>

    <script>
        let hotChartInstance = null;
        let coldChartInstance = null;

        fetch('lotto-data.json')
            .then(response => response.json())
            .then(jsonData => {
                const totalRounds = jsonData.draws.length;
                const recentRounds = Math.min(50, totalRounds);

                document.getElementById('subtitle').innerHTML = 
                    `최신 <strong>${totalRounds}</strong>회차 기준 (최근 ${recentRounds}회 비교)`;

                // 전체 & 최근 50회 출현 횟수 계산
                const overallFreq = new Array(45).fill(0);
                const recentFreq = new Array(45).fill(0);

                jsonData.draws.forEach((draw, index) => {
                    draw.numbers.forEach(num => {
                        if (num >= 1 && num <= 45) {
                            overallFreq[num - 1]++;
                            if (index >= totalRounds - recentRounds) {
                                recentFreq[num - 1]++;
                            }
                        }
                    });
                });

                // Hot 10
                const hotData = [...Array(45).keys()].map(i => ({
                    num: i + 1,
                    overall: overallFreq[i],
                    recent: recentFreq[i]
                })).sort((a, b) => b.recent - a.recent).slice(0, 10);

                // Cold 10
                const coldData = [...Array(45).keys()].map(i => ({
                    num: i + 1,
                    overall: overallFreq[i],
                    recent: recentFreq[i]
                })).sort((a, b) => a.recent - b.recent).slice(0, 10);

                // 차트 렌더링
                renderChart('hotChart', hotData.map(d => d.num), hotData.map(d => d.recent), 'Hot Numbers (최근 50회)');
                renderChart('coldChart', coldData.map(d => d.num), coldData.map(d => d.recent), 'Cold Numbers (최근 50회)');

                // 비교 테이블
                const tbody = document.querySelector('#trendTable tbody');
                tbody.innerHTML = '';
                const allNumbers = [...Array(45).keys()].map(i => ({
                    num: i + 1,
                    overall: overallFreq[i],
                    recent: recentFreq[i]
                })).sort((a, b) => b.recent - a.recent);

                allNumbers.forEach(item => {
                    const expected = Math.round(item.overall / totalRounds * recentRounds);
                    const diff = item.recent - expected;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${item.num}</strong></td>
                        <td>${item.overall}회</td>
                        <td>${item.recent}회</td>
                        <td style="font-weight:bold; color:${diff > 0 ? '#003087' : '#888'};">${diff > 0 ? '+' : ''}${diff}</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById('subtitle').innerHTML = 
                    `<span style="color:red;">데이터 로드 실패 - lotto-data.json 확인</span>`;
            });

        function renderChart(canvasId, labels, data, labelText) {
            const canvas = document.getElementById(canvasId);
            
            // 기존 차트가 있으면 제거
            if (canvasId === 'hotChart' && hotChartInstance) hotChartInstance.destroy();
            if (canvasId === 'coldChart' && coldChartInstance) coldChartInstance.destroy();

            const chartInstance = new Chart(canvas, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: labelText,
                        data: data,
                        backgroundColor: '#003087'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    scales: { x: { beginAtZero: true } }
                }
            });

            // 인스턴스 저장
            if (canvasId === 'hotChart') hotChartInstance = chartInstance;
            if (canvasId === 'coldChart') coldChartInstance = chartInstance;
        }

        function toggleMenu() {
            const menu = document.getElementById('nav-menu');
            menu.classList.toggle('active');
        }
    </script>
