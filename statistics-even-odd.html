    <div class="container">
        <h1>3. 홀짝 비율 분석</h1>
        <p id="subtitle" class="subtitle">로또 6/45 데이터를 분석 중...</p>
        
        <canvas id="evenOddChart"></canvas>

        <h2>홀짝 패턴 상세 분포</h2>
        <table id="evenOddTable">
            <thead>
                <tr>
                    <th>패턴</th>
                    <th>출현 횟수</th>
                    <th>비율</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <a href="statistics.html" class="back-btn">← 통계 메인으로 돌아가기</a>
    </div>

    <footer style="margin-top:60px; font-size:0.8em; color:gray; text-align:center;">
        <p>&copy; 2026 lottodraw.kr. All rights reserved.</p>
    </footer>

    <script>
        let myChart = null;

        fetch('lotto-data.json')
            .then(response => response.json())
            .then(jsonData => {
                const totalRounds = jsonData.draws.length;

                // 최신 회차 수 동적 표시
                document.getElementById('subtitle').innerHTML = 
                    `최신 <strong>${totalRounds}</strong>회차 기준`;

                // 홀짝 패턴 계산 (짝수 개수 기준)
                const patternCount = new Array(7).fill(0); // 0짝 ~ 6짝

                jsonData.draws.forEach(draw => {
                    let evenCount = 0;
                    draw.numbers.forEach(num => {
                        if (num % 2 === 0) evenCount++;
                    });
                    patternCount[evenCount]++;
                });

                const labels = [
                    '6짝 0홀', '5짝 1홀', '4짝 2홀', 
                    '3짝 3홀', '2짝 4홀', '1짝 5홀', '0짝 6홀'
                ];
                const counts = patternCount;
                const percentages = counts.map(c => (c / totalRounds * 100).toFixed(2) + '%');

                // 가로 막대 차트
                renderChart(labels, counts);

                // 테이블 채우기
                const tbody = document.querySelector('#evenOddTable tbody');
                tbody.innerHTML = '';
                labels.forEach((label, i) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${label}</strong></td>
                        <td>${counts[i]}회</td>
                        <td>${percentages[i]}</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById('subtitle').innerHTML = 
                    `<span style="color:red;">데이터 로드 실패 - lotto-data.json 확인</span>`;
            });

        function renderChart(labels, data) {
            if (myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('evenOddChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '출현 횟수',
                        data: data,
                        backgroundColor: '#003087',
                        borderColor: '#003087',
                        borderWidth: 1
                    }]
                },
                options: {
                    indexAxis: 'y',   // 가로 막대
                    responsive: true,
                    scales: {
                        x: { beginAtZero: true }
                    }
                }
            });
        }

        function toggleMenu() {
            const menu = document.getElementById('nav-menu');
            menu.classList.toggle('active');
        }
    </script>
