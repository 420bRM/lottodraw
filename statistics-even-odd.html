        nav { background-color: #fefefe; padding: 10px; text-align: center; }
        nav ul { list-style: none; padding: 0; margin: 0; display: flex; justify-content: center; }

<body>

        <ul id="nav-menu">

            <li><a href="statistics.html" style="color:#003087; font-weight:bold;">Statistics</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>3. 짝수/홀수 비율 (1,221회차 기준)</h1>
        <p class="subtitle">각 회차의 본번호 6개 중 짝수와 홀수의 개수 분포입니다.<br>가장 흔한 패턴은 3짝 3홀입니다.</p>
        
        <canvas id="evenOddChart"></canvas>

        <h2>패턴별 상세 분포</h2>
        <table>
            <thead>
                <tr>
                    <th>짝수 개수</th>
                    <th>홀수 개수</th>
                    <th>회차 수</th>
                    <th>비율</th>
                </tr>
            </thead>
            <tbody id="evenOddTable"></tbody>
        </table>

        <a href="statistics.html" class="back-btn">← 통계 메인으로 돌아가기</a>
    </div>

    <script>
        // 데이터 (1,221회차 실제 분석 기준)
        const labels = ['0짝 6홀', '1짝 5홀', '2짝 4홀', '3짝 3홀', '4짝 2홀', '5짝 1홀', '6짝 0홀'];
        const values = [18, 85, 326, 409, 271, 95, 17];

        new Chart(document.getElementById('evenOddChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '회차 수',
                    data: values,
                    backgroundColor: '#003087',
                    borderColor: '#002266',
                    borderWidth: 1
                }]
            },
            options: {
                indexAxis: 'y',           // 가로 막대 차트
                responsive: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: (ctx) => `${ctx.raw}회`
                        }
                    }
                },
                scales: {
                    x: { beginAtZero: true, title: { display: true, text: '회차 수' } },
                    y: { title: { display: true, text: '패턴' } }
                }
            }
        });

        // 테이블 데이터
        const tableData = [
            {even:0, odd:6, count:18,  percent:"1.5%"},
            {even:1, odd:5, count:85,  percent:"7.0%"},
            {even:2, odd:4, count:326, percent:"26.7%"},
            {even:3, odd:3, count:409, percent:"33.5%"},
            {even:4, odd:2, count:271, percent:"22.2%"},
            {even:5, odd:1, count:95,  percent:"7.8%"},
            {even:6, odd:0, count:17,  percent:"1.4%"}
        ];

        const tbody = document.getElementById('evenOddTable');
        tableData.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.even}짝</td>
                <td>${item.odd}홀</td>
                <td>${item.count}회</td>
                <td>${item.percent}</td>
            `;
            tbody.appendChild(tr);
        });
    </script>

    <footer style="margin-top:60px; font-size:0.8em; color:gray; text-align:center;">

    </footer>
</body>
